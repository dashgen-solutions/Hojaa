services:
  # PostgreSQL Database
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hojaa_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hojaa_db
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-this-in-production}
      ENVIRONMENT: production
      DEBUG: "False"
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:3001"]'
      # SMTP Email Notifications
      SMTP_ENABLED: ${SMTP_ENABLED:-false}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hojaa}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-true}
      # Mailchimp (legacy — kept for reference)
      MAILCHIMP_ENABLED: ${MAILCHIMP_ENABLED:-false}
      MAILCHIMP_API_KEY: ${MAILCHIMP_API_KEY:-}
      MAILCHIMP_SERVER_PREFIX: ${MAILCHIMP_SERVER_PREFIX:-}
      MAILCHIMP_AUDIENCE_ID: ${MAILCHIMP_AUDIENCE_ID:-}
      MAILCHIMP_FROM_EMAIL: ${MAILCHIMP_FROM_EMAIL:-}
      MAILCHIMP_FROM_NAME: ${MAILCHIMP_FROM_NAME:-}
      # Platform admin (metrics dashboard)
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-admin@hojaa.com}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
