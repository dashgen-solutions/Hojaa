name: hojaa

services:
  # PostgreSQL Database
  db:
    image: postgres:14-alpine
    container_name: hojaa-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-hojaa_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hojaa_network
    restart: unless-stopped

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements.prod.txt
    container_name: hojaa-api
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-hojaa_db}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY:-}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT:-}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-}
      AZURE_OPENAI_API_VERSION: ${AZURE_OPENAI_API_VERSION:-2024-02-15-preview}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      SECRET_KEY: ${SECRET_KEY}
      ENVIRONMENT: production
      DEBUG: "False"
      CORS_ORIGINS: '["https://hojaa.com","https://www.hojaa.com"]'
      SMTP_ENABLED: ${SMTP_ENABLED:-true}
      SMTP_HOST: ${SMTP_HOST:-smtpout.secureserver.net}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USERNAME: ${SMTP_USERNAME:-contact@hojaa.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-contact@hojaa.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-Hojaa}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-false}
      PLATFORM_ADMIN_EMAIL: ${PLATFORM_ADMIN_EMAIL:-contact@hojaa.com}
      PLATFORM_ADMIN_PASSWORD: ${PLATFORM_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - hojaa_network
    restart: unless-stopped

  # Next.js Web UI
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://hojaa.com
    container_name: hojaa-web
    environment:
      NEXT_PUBLIC_API_URL: https://hojaa.com
    depends_on:
      api:
        condition: service_healthy
    networks:
      - hojaa_network
    restart: unless-stopped

  # Caddy Reverse Proxy (auto-HTTPS via Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: hojaa-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_started
    networks:
      - hojaa_network
    restart: unless-stopped

networks:
  hojaa_network:
    driver: bridge

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
